      - name: id
        required: true
    request:
      method: GET
      path: /2/users/{{filter.id}}
      query:
        - name: user.fields
          from: literal
          value: affiliation,created_at,description,entities,id,location,name,pinned_tweet_id,profile_image_url,protected,public_metrics,url,username,verified,verified_type,withheld
    response:
      rows_path: [data]
      row_strategy: direct
    pagination:
      mode: none
    columns:
